# Server layout the prober rules assume. Loaded by t/prober/run.sh, which
# substitutes @MODULE@ and @PORT@.
#
# Upstream is 127.0.0.1:1, which nothing listens on, so a request that PASSES
# the shield returns 502 and a request the shield BLOCKS returns 403. That
# asymmetry is the only reliable way to tell the two apart: `return 200`
# short-circuits before the PRECONTENT phase and empty_gif 405s a POST, and
# both read as "not blocked" (see the module's memory index.md).

load_module @MODULE@;

daemon off;
master_process on;
worker_processes 1;

error_log logs/error.log info;
pid       logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log off;

    shield_ban_zone probezone:1m;

    server {
        listen 127.0.0.1:@PORT@;
        server_name prober;

        location /guarded {
            shield block;
            proxy_pass http://127.0.0.1:1;
        }

        location /detected {
            shield detect;
            proxy_pass http://127.0.0.1:1;
        }

        location /unguarded {
            shield off;
            proxy_pass http://127.0.0.1:1;
        }

        location /body {
            shield block;
            shield_body on;
            proxy_pass http://127.0.0.1:1;
        }

        # count=2 so the second hit arms the ban; bantime is long enough that
        # nothing expires mid-run.
        location /banned {
            shield block;
            shield_ban zone=probezone count=2 window=60s bantime=600s;
            proxy_pass http://127.0.0.1:1;
        }

        location /__probe {
            shield_probe probezone;
        }
    }
}
