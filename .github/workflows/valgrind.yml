name: Valgrind

# Valgrind memcheck lite soak on every PR/push — 60s memcheck of the debug
# nginx + shield module under a mixed attack/benign request storm. The full
# memcheck + helgrind soak (600s each) lives in ci-deep.yml (monthly cron +
# workflow_dispatch).
#
# Action pin (keep in sync with build-test.yml):
# actions/checkout@v5 -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: valgrind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  memcheck-lite:
    name: Memcheck lite (60s soak)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev valgrind

      - name: Build debug nginx + module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Memcheck soak (60s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" 60 4
