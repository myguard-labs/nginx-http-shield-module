name: CI Deep

# Exhaustive dynamic analysis — monthly cron + on-demand only, NEVER on PR.
# The PR-time gates live in standalone workflows: fuzzing.yml (fast fuzz
# regression), valgrind.yml (memcheck lite soak) and security-scanners.yml
# (scanners) — this file stays the exhaustive monthly + dispatch run.
#
# RUNNER TRUST BOUNDARY: this is the ONLY workflow allowed on the self-hosted
# builder02 runner, because it is never triggered by `pull_request` — schedule
# and workflow_dispatch both run repository-owner-approved code from a branch.
# Every PR-triggered workflow MUST run on a GitHub-hosted runner: this is a
# public repository, so a fork PR would otherwise execute attacker-controlled
# repository scripts (tools/ci-build.sh, fuzz/build.sh, tools/soak.sh) on the
# build host. See GitHub's guidance on self-hosted runners and public repos:
# https://docs.github.com/en/actions/reference/security/secure-use
#
# Jobs: build-flavors · fuzz (long, scan target) · memcheck soak · helgrind
# soak · scanners.
#   * build-flavors builds nginx mainline, nginx stable and angie. nginx
#     mainline and stable additionally run t/; angie is build-only and runs a
#     module-load smoke test instead (stock Test::Nginx cannot drive it — see
#     the job's own comment). The README claims angie support and
#     tools/ci-build.sh has always accepted the flavor, but every other job pins
#     ONE mainline version — nothing actually built angie or nginx stable until
#     this job. It is here (monthly) rather than in the PR gate because it is
#     three full server builds; a break in stable/angie is not worth blocking
#     every PR on.
#   * memcheck AND helgrind run via tools/soak.sh (USE_VALGRIND / USE_HELGRIND),
#     which passes --suppressions=tools/valgrind.supp and --error-exitcode=99.
#
# Action pins (keep in sync with build-test.yml):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"
  # Pinned so a scanner release cannot silently change the gate.
  SEMGREP_VERSION: "1.169.0"

on:
  schedule:
    # Monthly, day 6 @ 03:30 UTC — staggered from codeql.yml (day 4).
    - cron: "30 3 6 * *"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Fuzz duration (seconds)"
        required: false
        default: "3600"

concurrency:
  group: ci-deep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-flavors:
    name: Build & Test::Nginx (${{ matrix.label }} ${{ matrix.version }})
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            version: "1.31.1"
            label: mainline
          - flavor: nginx
            version: "1.30.3"
            label: stable
          - flavor: angie
            version: "1.12.0"
            label: angie
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      - name: Build server and dynamic module
        run: |
          bash tools/ci-build.sh "${{ matrix.flavor }}" "${{ matrix.version }}"
          build=".build/${{ matrix.flavor }}-${{ matrix.version }}/objs"
          test -f "$build/ngx_http_shield_module.so"
          # angie names its binary objs/angie; nginx names it objs/nginx.
          test -f "$build/${{ matrix.flavor }}"

      # angie is build-only, deliberately. Stock Test::Nginx::Socket probes the
      # server with -V and requires "nginx version: .../<x>.<y>" (Util.pm:1365);
      # angie reports "Angie version: Angie/1.12.0" and the harness bails out
      # before the first test. Running t/ on angie therefore needs a harness
      # shim, not a config tweak -- until someone writes it, asserting that the
      # module COMPILES and LINKS against angie is the honest gate. That alone
      # has value: it is what caught -Wshadow leaking into angie's core.
      - name: Run t/
        if: matrix.flavor == 'nginx'
        env:
          TEST_NGINX_BINARY: ${{ github.workspace }}/.build/${{ matrix.flavor }}-${{ matrix.version }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: ${{ github.workspace }}/.build/${{ matrix.flavor }}-${{ matrix.version }}/objs/ngx_http_shield_module.so
          # Must be 20, not the ~2s Test::Nginx::Socket default — see the
          # identical setting in build-test.yml.
          TEST_NGINX_TIMEOUT: "20"
        run: prove t/

      - name: Load the module (angie build-only smoke check)
        if: matrix.flavor == 'angie'
        run: |
          set -euo pipefail
          build="$PWD/.build/${{ matrix.flavor }}-${{ matrix.version }}"
          tp="$RUNNER_TEMP/angie-smoke"
          mkdir -p "$tp/logs"
          cat > "$tp/nginx.conf" <<EOF
          load_module $build/objs/ngx_http_shield_module.so;
          events {}
          http {
              server {
                  listen 18095;
                  location / { shield block; empty_gif; }
              }
          }
          EOF
          "$build/objs/angie" -t -p "$tp" -c "$tp/nginx.conf"
          echo "OK: module loads and directives parse under angie"

  fuzz:
    name: Fuzz (scan target, long)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 600
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev zlib1g-dev

      - name: Select fuzz duration
        env:
          # Never interpolate the raw input into the shell command: an arbitrary
          # workflow_dispatch string would become runner shell syntax. Bind it to
          # an environment variable and validate it before use.
          EVENT_NAME: ${{ github.event_name }}
          FUZZ_SECONDS_INPUT: ${{ inputs.fuzz_seconds }}
        run: |
          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            echo "FUZZ_SECS=14400" >> "$GITHUB_ENV"
            exit 0
          fi
          # Bounded positive integer: 60 s .. 8 h. Anything else fails the job.
          case "$FUZZ_SECONDS_INPUT" in
            "")
              echo "FUZZ_SECS=3600" >> "$GITHUB_ENV"
              exit 0
              ;;
            *[!0-9]*)
              echo "ERROR: fuzz_seconds must be a positive integer" >&2
              exit 1
              ;;
          esac
          if [ "$FUZZ_SECONDS_INPUT" -lt 60 ] || [ "$FUZZ_SECONDS_INPUT" -gt 28800 ]; then
            echo "ERROR: fuzz_seconds must be between 60 and 28800" >&2
            exit 1
          fi
          echo "FUZZ_SECS=$FUZZ_SECONDS_INPUT" >> "$GITHUB_ENV"

      - name: Fetch + configure nginx source (fuzz build needs headers)
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION"

      - name: Build fuzz target
        run: CC=clang bash fuzz/build.sh

      - name: Fuzz scan target
        run: |
          set -euo pipefail
          cd fuzz
          echo "=== fuzz_scan (${FUZZ_SECS}s) ==="
          set +e
          ./fuzz_scan \
            -max_total_time="$FUZZ_SECS" \
            -dict=fuzz.dict \
            -print_final_stats=1 \
            -artifact_prefix="crash-fuzz_scan-" \
            corpus/fuzz_scan
          rc=$?
          set -e
          [ $rc -eq 0 ] || { echo "❌ fuzz_scan crash (exit $rc)"; exit 1; }
          echo "✓ fuzz_scan: no crashes in ${FUZZ_SECS}s"
          # Minimize + persist the merged corpus.
          mkdir -p corpus-min/fuzz_scan
          ./fuzz_scan -merge=1 corpus-min/fuzz_scan corpus/fuzz_scan || true
          echo "merged: $(find corpus-min/fuzz_scan -type f | wc -l) units"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-deep-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus
        if: success()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: ${{ github.workspace }}/fuzz/corpus-min
          retention-days: 30

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / fuzz FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  memcheck:
    name: Valgrind Memcheck soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev zlib1g-dev valgrind
      - name: Build debug nginx + module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug
      - name: Memcheck soak (600s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / memcheck FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  helgrind:
    name: Valgrind Helgrind soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev zlib1g-dev valgrind
      - name: Build debug nginx + module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug
      - name: Helgrind soak (600s @ 4 conc, --error-exitcode=99, WITH suppressions)
        env:
          USE_HELGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / helgrind FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  scanners:
    name: Security scanners
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flawfinder clang-tidy python3 python3-pip pipx curl \
            libpcre2-dev zlib1g-dev
          if command -v pipx >/dev/null; then
            pipx install --quiet "semgrep==${SEMGREP_VERSION}"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages \
              "semgrep==${SEMGREP_VERSION}"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Generate nginx build headers (for clang-tidy)
        run: |
          # Pinned to the same NGINX_VERSION the build jobs use, and verified
          # against tools/sources.sha256 before extraction: scraping "latest"
          # and executing its configure script trusts whatever the origin
          # serves at that moment.
          set -euo pipefail
          tarball="nginx-${NGINX_VERSION}.tar.gz"
          curl -fsSL -o "$RUNNER_TEMP/$tarball" \
            "https://nginx.org/download/$tarball"
          ( cd "$RUNNER_TEMP" \
            && grep -E "[[:space:]]${tarball}\$" \
                 "$GITHUB_WORKSPACE/tools/sources.sha256" | sha256sum -c - )
          tar -xzf "$RUNNER_TEMP/$tarball" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/nginx-${NGINX_VERSION}" "$RUNNER_TEMP/nginx-src"
          cd "$RUNNER_TEMP/nginx-src"
          CC=gcc ./configure --with-compat \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null
      - name: flawfinder (gate on >=4)
        run: |
          set -euo pipefail
          flawfinder --minlevel=1 "$GITHUB_WORKSPACE/src/" 2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet "$GITHUB_WORKSPACE/src/" 2>/dev/null \
               | grep -Eq 'Hits = [1-9]'; then
            echo "flawfinder: high-severity (>=4) findings present" >&2
            exit 1
          fi
          echo "flawfinder: clean at >=4"
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$RUNNER_TEMP/nginx-src"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules \
            -I$N/src/http/v2 -I$GITHUB_WORKSPACE/src -I/usr/include"
          status=0
          for src in "$GITHUB_WORKSPACE"/src/*.c; do
            echo "--- clang-tidy: $(basename "$src") ---"
            # shellcheck disable=SC2086
            clang-tidy "$src" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' \
              -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"
      - name: semgrep (gate)
        run: |
          # --error makes a finding a non-zero exit; without it (and with the
          # old `|| true`) both findings and a scanner crash produced a green
          # job, so the advertised gate could not fail. set -o pipefail keeps
          # `tee` from swallowing that status.
          set -euo pipefail
          semgrep scan --error --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
