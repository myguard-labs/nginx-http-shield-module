name: Security scanners

# Static/security scanners gate on every PR/push — flawfinder (gate on >=4),
# clang-tidy (cert-*, security.*) and semgrep over src/. Same job as the
# monthly ci-deep.yml scanners run.
#
# Action pin (keep in sync with build-test.yml):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Keep in sync with build-test.yml. Pinned, not scraped: the digest for this
  # version is recorded in tools/sources.sha256 and verified before extraction.
  NGINX_VERSION: "1.31.3"
  # Pinned so a scanner release cannot silently change the gate.
  SEMGREP_VERSION: "1.169.0"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: security-scanners-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scanners:
    name: Security scanners
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flawfinder clang-tidy python3 python3-pip pipx curl \
            libpcre2-dev zlib1g-dev
          # semgrep: isolate via pipx (PEP 668 blocks a bare pip3 install into
          # the system Python on the Ubuntu 24.04 self-hosted runner).
          if command -v pipx >/dev/null; then
            pipx install --quiet "semgrep==${SEMGREP_VERSION}"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages \
              "semgrep==${SEMGREP_VERSION}"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Generate nginx build headers (for clang-tidy)
        run: |
          # Pinned to the same NGINX_VERSION the build jobs use, and verified
          # against tools/sources.sha256 before extraction: scraping "latest"
          # and executing its configure script trusts whatever the origin
          # serves at that moment.
          set -euo pipefail
          tarball="nginx-${NGINX_VERSION}.tar.gz"
          curl -fsSL -o "$RUNNER_TEMP/$tarball" \
            "https://nginx.org/download/$tarball"
          ( cd "$RUNNER_TEMP" \
            && grep -E "[[:space:]]${tarball}\$" \
                 "$GITHUB_WORKSPACE/tools/sources.sha256" | sha256sum -c - )
          tar -xzf "$RUNNER_TEMP/$tarball" -C "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/nginx-${NGINX_VERSION}" "$RUNNER_TEMP/nginx-src"
          cd "$RUNNER_TEMP/nginx-src"
          CC=gcc ./configure --with-compat \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null
      - name: flawfinder (gate on >=4)
        run: |
          set -euo pipefail
          flawfinder --minlevel=1 "$GITHUB_WORKSPACE/src/" 2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet "$GITHUB_WORKSPACE/src/" 2>/dev/null \
               | grep -Eq 'Hits = [1-9]'; then
            echo "flawfinder: high-severity (>=4) findings present" >&2
            exit 1
          fi
          echo "flawfinder: clean at >=4"
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$RUNNER_TEMP/nginx-src"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules \
            -I$N/src/http/v2 -I$GITHUB_WORKSPACE/src -I/usr/include"
          status=0
          for src in "$GITHUB_WORKSPACE"/src/*.c; do
            echo "--- clang-tidy: $(basename "$src") ---"
            # shellcheck disable=SC2086
            clang-tidy "$src" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' \
              -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"
      - name: semgrep (gate)
        run: |
          # --error makes a finding a non-zero exit; without it (and with the
          # old `|| true`) both findings and a scanner crash produced a green
          # job, so the advertised gate could not fail. set -o pipefail keeps
          # `tee` from swallowing that status.
          set -euo pipefail
          semgrep scan --error --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
