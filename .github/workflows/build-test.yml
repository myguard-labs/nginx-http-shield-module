name: Build and Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.3"
  ANGIE_VERSION: "1.12.0"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck shellcheck

      - name: Validate scripts and source
        run: |
          bash -n tools/ci-build.sh
          shellcheck tools/ci-build.sh
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=normalCheckLevelMaxBranches \
            --suppress=unusedFunction \
            --suppress=unusedStructMember \
            -I src \
            src/ngx_http_shield_module.c \
            src/ngx_http_shield_ban.c
          git diff --check

      - name: Check runner trust boundary
        run: |
          shellcheck tools/check-workflow-runners.sh
          bash tools/check-workflow-runners.sh

      - name: Lint workflows
        run: |
          version=1.7.7
          base="https://github.com/rhysd/actionlint/releases/download/v${version}"
          tarball="actionlint_${version}_linux_amd64.tar.gz"
          # Verify the tarball against the checksums file published in the same
          # signed release before executing it, so a tampered asset fails.
          curl -fsSL -o /tmp/actionlint.tgz "${base}/${tarball}"
          curl -fsSL -o /tmp/actionlint.checksums \
            "${base}/actionlint_${version}_checksums.txt"
          ( cd /tmp && grep " ${tarball}\$" actionlint.checksums \
              | sed 's#'"${tarball}"'#actionlint.tgz#' | sha256sum -c - )
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          /tmp/actionlint -color .github/workflows/*.yml

      - name: Audit workflows (zizmor)
        run: |
          # Pinned: an unpinned scanner is both a supply-chain risk and a
          # source of surprise CI breakage. Fails the job on any finding, so a
          # reintroduced template injection cannot merge.
          pip install --quiet 'zizmor==1.26.1'
          zizmor --no-progress .github/workflows/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: src-nginx-${{ env.NGINX_VERSION }}

      - name: Build server and dynamic module
        run: |
          bash tools/ci-build.sh nginx "$NGINX_VERSION"
          build=".build/nginx-${NGINX_VERSION}/objs"
          test -f "$build/ngx_http_shield_module.so"

      # `-t` alone only proves a single minimal directive parses. `-T` dumps the
      # fully-merged config, which is what actually exercises directive
      # inheritance across nested contexts -- the case a real multi-server/
      # multi-location config hits that a one-location smoke test never would.
      - name: Module directives survive a merged multi-context dump (-T)
        run: |
          set -euo pipefail
          build="$PWD/.build/nginx-${NGINX_VERSION}"
          tp="$RUNNER_TEMP/dumptest"
          mkdir -p "$tp/logs"
          cat > "$tp/nginx.conf" <<EOF
          load_module $build/objs/ngx_http_shield_module.so;
          events {}
          http {
              server {
                  listen 18097;
                  location /a { shield block; empty_gif; }
                  location /b {
                      shield detect;
                      shield_status 404;
                      location /b/inner { shield_body on; empty_gif; }
                  }
              }
              server {
                  listen 18096;
                  location /c { shield off; empty_gif; }
              }
          }
          EOF
          out="$("$build/objs/nginx" -T -p "$tp" -c "$tp/nginx.conf")"
          echo "$out"
          for want in "location /a" "location /b/inner" "location /c"; do
            echo "$out" | grep -qF "$want" \
              || { echo "FAIL: -T dump missing '$want'" >&2; exit 1; }
          done
          echo "OK: directives survived merged multi-context dump"

      - name: Strict module compile
        run: |
          build=".build/nginx-${NGINX_VERSION}"
          cflags=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' "$build/objs/Makefile")
          incs=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); continued=(line ~ /\\$/); gsub(/\\$/, "", line); printf "%s ", line; if (!continued) exit}' "$build/objs/Makefile")
          # cflags and incs are compiler flag lists and must word-split.
          # shellcheck disable=SC2086
          (
            cd "$build"
            for src in ngx_http_shield_module ngx_http_shield_ban; do
              cc -c -fPIC $cflags \
                -Wall -Wextra -Wshadow -Wstrict-prototypes \
                -Wstrict-aliasing -Wunreachable-code -Werror \
                -Wno-unused-parameter \
                -I "$GITHUB_WORKSPACE/src" \
                $incs "$GITHUB_WORKSPACE/src/${src}.c" \
                -o "/tmp/${src}.o"
            done
          )

  test-nginx:
    name: Test::Nginx
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          # Test::Nginx is not packaged on the runner; install it from CPAN.
          sudo cpanm --notest --quiet Test::Nginx

      - name: Build dynamic module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION"

      - name: Run t/
        env:
          TEST_NGINX_BINARY: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_LOAD_MODULES: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/ngx_http_shield_module.so
          TEST_NGINX_TIMEOUT: "20"
        run: prove -v t/

  asan:
    name: ASan and UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      # Static + sanitizer build so the ASan/UBSan runtime is linked into the
      # server binary; then drive every attack path through the Test::Nginx
      # suite with halt-on-error so any memory or UB fault fails the job.
      - name: Build with sanitizers
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" asan

      - name: Run t/ under ASan and UBSan
        env:
          TEST_NGINX_BINARY: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_TIMEOUT: "30"
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: prove -v t/

  reporter-tests:
    name: Reporter unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install pytest
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pytest python3-pytest-cov

      # The AbuseIPDB reporter (reporter/abuseipdb-reporter.py) runs out of band
      # from nginx; these tests exercise its suppression, backoff, PII-strip and
      # offset-persistence logic with no network (dry-run / monkeypatched).
      # --cov-fail-under gates the coverage so a future edit that drops a tested
      # path (or adds an untested one) fails the PR rather than silently rotting.
      - name: Run reporter unit tests with coverage
        run: |
          python3 -m pytest -q reporter/test_abuseipdb_reporter.py \
            --cov=. --cov-report=term-missing --cov-fail-under=95

  ban-unit:
    name: Ban unit harness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang curl libpcre2-dev zlib1g-dev

      # The ban shared-memory state engine (src/ngx_http_shield_ban.c) is driven
      # by a direct-call harness with synthetic addresses + a synthetic clock --
      # the multi-node rbtree, LRU eviction, window-slide and ban-expiry paths
      # Test::Nginx cannot reach (single loopback client, no clock control).
      # Run it under ASan/UBSan so the eviction pointer walk is fault-checked.
      - name: Configure nginx tree (headers + ngx_rbtree.c)
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION"

      - name: Build and run ban unit harness (ASan/UBSan)
        env:
          CC: clang
          EXTRA_CFLAGS: "-fsanitize=address,undefined -fno-sanitize-recover=all"
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: bash t/run-ban-unit.sh

  prober:
    name: Prober rules (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            version_key: NGINX_VERSION
          - flavor: angie
            version_key: ANGIE_VERSION
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl libpcre2-dev zlib1g-dev

      # The expansion goes through a step env var rather than straight into the
      # run block: an inline ${{ }} is substituted into the script text before
      # the shell ever sees it, which is the template-injection shape zizmor
      # fails the Validation job on.
      - name: Resolve version
        env:
          RESOLVED_VERSION: ${{ env[matrix.version_key] }}
        run: echo "VER=$RESOLVED_VERSION" >> "$GITHUB_ENV"

      # This is the angie leg's whole point. Stock Test::Nginx::Socket refuses to
      # run against angie: it probes the version banner and requires
      # "nginx version: x.y", while angie answers "Angie version: Angie/x.y", so
      # it bails before the first test. Until now the angie leg was therefore
      # build-and-load only. The prober reads no banner, so angie gets the same
      # functional coverage nginx does.
      - name: Build server with the test harness
        run: TEST_HARNESS=1 bash tools/ci-build.sh "${{ matrix.flavor }}" "$VER" debug

      - name: Build the prober
        run: bash t/prober/build.sh

      - name: Run prober rules
        run: bash t/prober/run.sh "${{ matrix.flavor }}" "$VER"

  coverage:
    name: C line coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev zlib1g-dev lcov \
            cpanminus libio-socket-ssl-perl
          sudo cpanm --notest --quiet Test::Nginx

      # gcov-instrumented static build so the module TU is measured while the
      # Test::Nginx suite drives every attack/config path through the very
      # server binary that carries the counters.
      # TEST_HARNESS=1 so the coverage build carries the probe endpoint and the
      # slab fault injector. Without it the prober cannot run, and the
      # alloc-failure paths whose LCOV_EXCL markers were removed would count as
      # uncovered and drag the run under the floor.
      - name: Build with coverage instrumentation
        run: TEST_HARNESS=1 bash tools/ci-build.sh nginx "$NGINX_VERSION" coverage

      - name: Run t/ (populates .gcda counters)
        env:
          TEST_NGINX_BINARY: ${{ github.workspace }}/.build/nginx-${{ env.NGINX_VERSION }}/objs/nginx
          TEST_NGINX_TIMEOUT: "30"
        run: prove t/

      # The prober reaches paths t/ structurally cannot: the slab-exhaustion
      # branch in ban_record (via armed allocation failure) and per-peer ban
      # behaviour (via bound source addresses out of 127.0.0.0/8).
      - name: Build the prober
        run: bash t/prober/build.sh

      - name: Run prober rules (adds fault-injection coverage)
        run: bash t/prober/run.sh nginx "$NGINX_VERSION"

      # The ban state engine's multi-node / eviction / window-slide / expiry
      # paths are unreachable from Test::Nginx (single loopback client, no clock
      # control). Build+run the direct-call harness under gcov too so those lines
      # are genuinely covered rather than LCOV_EXCL'd away. Its .gcda lands next
      # to t/ban_unit.c and is captured alongside the module's below.
      - name: Build and run ban unit harness (gcov)
        env:
          EXTRA_CFLAGS: "--coverage -fprofile-arcs -ftest-coverage"
        run: bash t/run-ban-unit.sh

      # Harvest coverage for our translation unit only; upstream nginx .gcda is
      # captured (core is instrumented too) but discarded by the --extract filter.
      # Two --directory args: the module TU built into nginx, and the harness's
      # ban.c object under t/.
      - name: Collect and gate module coverage
        run: |
          build=.build/nginx-${NGINX_VERSION}
          lcov --capture --directory "$build/objs/addon/src" --directory t \
            --output-file cov.info --rc geninfo_unexecuted_blocks=1
          lcov --extract cov.info '*ngx_http_shield*' --output-file cov-mod.info
          lcov --list cov-mod.info
          # Fail the job if module line coverage falls below the floor. The
          # remaining uncovered lines are OOM/alloc-failure returns that cannot
          # be driven without malloc fault injection.
          rate=$(lcov --summary cov-mod.info 2>&1 \
                 | sed -n 's/.*lines\.*: \([0-9.]*\)%.*/\1/p')
          echo "module line coverage: ${rate}%"
          awk -v r="$rate" 'BEGIN { exit (r+0 >= 90) ? 0 : 1 }' \
            || { echo "coverage ${rate}% below floor 90%"; exit 1; }
