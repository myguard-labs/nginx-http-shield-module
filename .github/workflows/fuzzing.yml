name: Fuzzing

# Fast fuzz regression gate on every PR/push — 120s on the scan core
# (normalize + substring match over the real signature tables, with nginx's
# real ngx_unescape_uri() decoder linked in). Long fuzz discovery (hours) lives
# in ci-deep.yml (monthly cron + workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.3"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: fuzzing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (120s)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev zlib1g-dev

      - name: Fetch + configure nginx source (fuzz build needs headers)
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION"

      - name: Build fuzz target
        run: CC=clang bash fuzz/build.sh

      - name: Run fuzz_scan 120s
        run: |
          set -euo pipefail
          cd fuzz
          echo "=== regression replay (-runs=0 over committed regressions) ==="
          set +e
          ./fuzz_scan -runs=0 regressions
          rrc=$?
          set -e
          [ $rrc -eq 0 ] || { echo "❌ regression replay crash (exit $rrc)"; exit 1; }
          echo "✓ regression replay: no crashes"
          echo "=== fuzz_scan (120s) ==="
          set +e
          ./fuzz_scan \
            -max_total_time=120 \
            -dict=fuzz.dict \
            -print_final_stats=1 \
            -artifact_prefix="crash-fuzz_scan-" \
            corpus/fuzz_scan regressions
          rc=$?
          set -e
          [ $rc -eq 0 ] || { echo "❌ fuzz_scan crash (exit $rc)"; exit 1; }
          echo "✓ fuzz_scan: no crashes in 120s"

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14
